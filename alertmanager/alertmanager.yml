# =============================================================================
# Alertmanager Configuration
#
# Starter config with a default route that drops to a null receiver.
# Add email, Slack, PagerDuty, or webhook receivers as needed.
# =============================================================================

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, instance]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts get shorter repeat interval
    - receiver: default
      match:
        severity: critical
      repeat_interval: 1h

receivers:
  - name: default
    # Placeholder — alerts are visible in Alertmanager UI but not forwarded.
    # Uncomment and configure one or more of the following:
    #
    # webhook_configs:
    #   - url: http://your-webhook-endpoint:5001/alert
    #     send_resolved: true
    #
    # email_configs:
    #   - to: ops-team@example.com
    #     from: alertmanager@example.com
    #     smarthost: smtp.example.com:587
    #     auth_username: alertmanager@example.com
    #     auth_password: smtp_password
    #
    # slack_configs:
    #   - api_url: https://hooks.slack.com/services/T.../B.../...
    #     channel: '#alerts'
    #     send_resolved: true

inhibit_rules:
  # If a critical alert fires, suppress warnings for the same instance.
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, instance]
