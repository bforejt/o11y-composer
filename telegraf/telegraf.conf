# =============================================================================
# Telegraf Configuration — gNMI Streaming Telemetry
#
# Generic gNMI subscriptions suitable for most network devices supporting
# OpenConfig models. Customize targets and subscriptions per vendor/platform.
#
# Outputs:
#   - prometheus_client: exposes /metrics for Prometheus scraping on :9273
#
# For Prometheus remote_write instead of scraping, switch to the
# http output plugin pointing at http://prometheus:9090/api/v1/write
# =============================================================================

[global_tags]
  collector = "telegraf"
  environment = "lab"

[agent]
  interval = "30s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "5s"
  flush_interval = "10s"
  flush_jitter = "5s"

# ---------------------------------------------------------------------------
# Output: Prometheus metrics endpoint (scraped by Prometheus)
# ---------------------------------------------------------------------------
[[outputs.prometheus_client]]
  listen = ":9273"
  metric_version = 2
  expiration_interval = "120s"
  path = "/metrics"

# ---------------------------------------------------------------------------
# Input: gNMI Streaming Telemetry
#
# Uncomment and configure for your network devices.
# Each [[inputs.gnmi]] block can target one or more devices.
#
# Common OpenConfig subscription paths:
#   /interfaces/interface/state          — interface counters, status
#   /network-instances/network-instance  — VRF, routing tables
#   /components/component                — hardware inventory, temps
#   /system/memory                       — memory utilization
#   /system/cpus/cpu                     — CPU utilization
#   /system/openflow                     — OpenFlow stats (if supported)
# ---------------------------------------------------------------------------

# [[inputs.gnmi]]
#   ## gNMI target addresses (host:port)
#   addresses = ["router01.lab:6030", "switch01.lab:6030"]
#
#   ## Authentication
#   username = "gnmi_user"
#   password = "gnmi_pass"
#
#   ## TLS — set to true for production
#   ## For lab with self-signed certs:
#   # tls_ca   = "/etc/telegraf/certs/ca.pem"
#   # tls_cert = "/etc/telegraf/certs/client.pem"
#   # tls_key  = "/etc/telegraf/certs/client.key"
#   insecure_skip_verify = true
#   # enable_tls = false
#
#   ## Encoding: proto, json, json_ietf (vendor-dependent)
#   encoding = "json_ietf"
#
#   ## Redial interval if connection drops
#   redial = "10s"
#
#   ## --- Subscriptions ---
#
#   [[inputs.gnmi.subscription]]
#     name = "interface_counters"
#     origin = "openconfig"
#     path = "/interfaces/interface/state/counters"
#     subscription_mode = "sample"
#     sample_interval = "30s"
#
#   [[inputs.gnmi.subscription]]
#     name = "interface_state"
#     origin = "openconfig"
#     path = "/interfaces/interface/state"
#     subscription_mode = "on_change"
#
#   [[inputs.gnmi.subscription]]
#     name = "system_memory"
#     origin = "openconfig"
#     path = "/system/memory"
#     subscription_mode = "sample"
#     sample_interval = "60s"
#
#   [[inputs.gnmi.subscription]]
#     name = "system_cpu"
#     origin = "openconfig"
#     path = "/system/cpus/cpu"
#     subscription_mode = "sample"
#     sample_interval = "60s"
#
#   [[inputs.gnmi.subscription]]
#     name = "bgp_neighbors"
#     origin = "openconfig"
#     path = "/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state"
#     subscription_mode = "on_change"
#
#   [[inputs.gnmi.subscription]]
#     name = "lldp_neighbors"
#     origin = "openconfig"
#     path = "/lldp/interfaces/interface/neighbors/neighbor/state"
#     subscription_mode = "on_change"

# ---------------------------------------------------------------------------
# Input: Internal Telegraf metrics (for monitoring Telegraf itself)
# ---------------------------------------------------------------------------
[[inputs.internal]]
  collect_memstats = true
  [inputs.internal.tags]
    service = "telegraf"
