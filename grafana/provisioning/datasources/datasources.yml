# =============================================================================
# Grafana Datasource Provisioning
#
# Auto-configures Prometheus and Loki datasources on first boot.
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 30s
      httpMethod: POST

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        # Example: extract IP addresses from log lines and link to Prometheus
        # - datasourceUid: <prometheus-uid>
        #   matcherRegex: "(?P<ip>\\d+\\.\\d+\\.\\d+\\.\\d+)"
        #   name: Source IP
        #   url: ""

  - name: Alertmanager
    type: alertmanager
    access: proxy
    url: http://alertmanager:9093
    editable: true
    jsonData:
      implementation: prometheus
